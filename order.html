<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Meat - Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Header -->
  <header class="bg-red-700 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Fresh Flesh - Place Order</h1>
    <nav>
      <a href="index.html" class="hover:underline">Home</a>
    </nav>
  </header>

  <!-- Order Container -->
  <section class="p-6 max-w-3xl mx-auto">
    <h2 class="text-xl font-semibold mb-4">🛒 Available Meats</h2>
    <div id="meat-list" class="grid gap-4 grid-cols-1 md:grid-cols-2"></div>
  </section>

  <!-- Customer Info & Confirm Order -->
  <section class="p-6 max-w-3xl mx-auto mt-10 bg-white rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Customer Info</h2>
    <form id="order-form" onsubmit="return false" class="space-y-4">
      <input type="text" id="customer-name" placeholder="Your Name" required class="w-full px-3 py-2 border rounded"/>
      <input type="tel" id="customer-phone" placeholder="Phone Number" required class="w-full px-3 py-2 border rounded"/>
      <textarea id="customer-address" placeholder="Delivery Address" required class="w-full px-3 py-2 border rounded"></textarea>
    </form>
  </section>

  <script src="order.js"></script>
</body>
</html>
