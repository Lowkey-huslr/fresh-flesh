<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Butcher Login | Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Header -->
  <header class="bg-red-700 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Fresh Flesh - Butcher Login</h1>
    <nav>
      <ul class="flex gap-4">
        <li><a href="index.html" class="hover:underline">Home</a></li>
        <li><a href="butcher.html" class="hover:underline">Register</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login Form -->
  <section class="max-w-md mx-auto py-12 px-6 bg-white rounded shadow mt-10">
    <h2 class="text-xl font-bold mb-6 text-center">🔐 Butcher Login</h2>
    <form id="login-form" class="space-y-4">
      <input type="text" id="login-mobile" placeholder="Mobile Number"
             class="w-full border px-4 py-2 rounded" required />
      <input type="password" id="login-password" placeholder="Password"
             class="w-full border px-4 py-2 rounded" required />
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Login
      </button>
    </form>
    <p id="login-error" class="text-red-600 mt-4 hidden">❌ Incorrect mobile number or password</p>
  </section>

  <script src="butcher-login.js"></script>
</body>
</html>
