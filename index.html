<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Flesh | Order Fresh Meat Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

  <!-- Header -->
  <header class="bg-red-700 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Fresh Flesh</h1>
    <nav>
      <ul class="flex gap-4">
        <li><a href="#" class="hover:underline">Home</a></li>
        <li><a href="#" class="hover:underline">Products</a></li>
        <li><a href="#" class="hover:underline">Cart</a></li>
        <li><a href="#" class="hover:underline">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="bg-pink-100 text-center py-12 px-4">
    <h2 class="text-3xl font-semibold mb-4">Fresh Meat Delivered to Your Doorstep</h2>
    <p class="mb-6">Quality meat, fast delivery, unbeatable freshness.</p>
    <button onclick="alert('Explore coming soon!')"
            class="bg-red-700 text-white px-6 py-2 rounded hover:bg-red-800 transition">
      Explore Products
    </button>
  </section>

  <!-- Products Section -->
  <section class="py-12 px-6">
    <h2 class="text-2xl font-bold text-center mb-8">Top Picks</h2>
    <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
      <!-- Products will be injected here by script.js -->
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-100 text-center py-4 text-sm">
    &copy; 2025 Fresh Flesh. All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
