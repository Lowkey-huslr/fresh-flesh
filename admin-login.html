<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center items-center min-h-screen">
  <div class="bg-white p-6 rounded shadow-lg w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-4 text-center text-red-600">Admin Login</h1>
    <form id="admin-login-form" class="space-y-4">
      <input type="text" id="admin-username" placeholder="Username" required class="w-full border px-3 py-2 rounded" />
      <input type="password" id="admin-password" placeholder="Password" required class="w-full border px-3 py-2 rounded" />
      <button type="submit" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700">
        Login
      </button>
    </form>
    <p id="admin-login-error" class="text-red-600 mt-3 hidden text-sm text-center">Invalid credentials!</p>
  </div>
  <script src="admin-login.js"></script>
</body>
</html>
