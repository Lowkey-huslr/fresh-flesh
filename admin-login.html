<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <header class="bg-red-700 text-white px-6 py-4">
    <h1 class="text-2xl font-bold">Fresh Flesh - Admin Login</h1>
  </header>

  <main class="max-w-md mx-auto py-12 px-6 bg-white rounded shadow mt-10">
    <h2 class="text-xl font-bold mb-6 text-center">🔐 Admin Login</h2>
    <form id="admin-login-form" class="space-y-4">
      <input type="text" id="admin-username" placeholder="Username"
             class="w-full border px-4 py-2 rounded" required />
      <input type="password" id="admin-password" placeholder="Password"
             class="w-full border px-4 py-2 rounded" required />
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        Login
      </button>
    </form>
    <p id="admin-error" class="text-red-600 mt-4 hidden">❌ Incorrect username or password</p>
  </main>

  <script src="admin-login.js"></script>
</body>
</html>
