<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login | Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <header class="bg-red-700 text-white px-6 py-4">
    <h1 class="text-2xl font-bold">Fresh Flesh - Customer Login</h1>
  </header>

  <main class="max-w-md mx-auto py-12 px-6 bg-white rounded shadow mt-10">
    <h2 class="text-xl font-bold mb-6 text-center">📲 Enter Your Mobile Number</h2>

    <div class="flex mb-4">
      <span class="inline-flex items-center px-3 bg-gray-200 text-gray-700 rounded-l border border-r-0">+91</span>
      <input type="text" id="customer-mobile" maxlength="10" placeholder="10-digit mobile"
             class="w-full border px-4 py-2 rounded-r" />
    </div>

    <button onclick="customerLogin()"
            class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
      Login
    </button>
  </main>

  <script src="customer-login.js"></script>
</body>
</html>
