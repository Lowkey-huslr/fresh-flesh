<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Butcher Panel | Fresh Flesh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Header -->
  <header class="bg-red-700 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Fresh Flesh - Butcher Portal</h1>
    <nav>
      <ul class="flex gap-4">
        <li><a href="index.html" class="hover:underline">Home</a></li>
      </ul>
    </nav>
  </header>

  <!-- Register/Login Container -->
  <section class="max-w-md mx-auto py-10 px-6 bg-white rounded shadow mt-10">
    <div id="step-1">
      <h2 class="text-xl font-bold mb-4">📱 Register with Mobile Number</h2>
      <div class="flex">
  <span class="inline-flex items-center px-3 bg-gray-200 text-gray-700 rounded-l border border-r-0">
    +91
  </span>
  <input type="text" id="mobile" placeholder="Enter 10-digit number"
         class="w-full border px-4 py-2 rounded-r" maxlength="10" required />
</div>

      <button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Send OTP</button>
    </div>

    <div id="step-2" class="hidden space-y-4">
  <p class="text-sm text-green-600">✅ OTP sent successfully!</p>
  <p class="text-gray-600">Your OTP is: <span id="display-otp" class="font-bold text-black"></span></p>

  <input type="text" id="otp-input" placeholder="Enter OTP"
         class="w-full border px-4 py-2 rounded" maxlength="4" />
  <div class="flex gap-4">
    <button onclick="verifyOTP()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Verify OTP
    </button>
    <button onclick="sendOTP(true)" class="bg-gray-300 text-gray-800 px-4 py-2 rounded hover:bg-gray-400">
      Resend OTP
    </button>
  </div>
</div>
